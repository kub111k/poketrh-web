<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | PokéMarket ČR</title>
    <meta name="description" content="Máte dotaz ohledně prodeje nebo výměny Pokémon karet? Kontaktujte náš tým PokéMarket ČR.">
    <meta name="keywords" content="kontakt PokéMarket, podpora Pokémon TCG">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.min.css?v=1.0">
</head>
<body>
    <div id="sablona-menu"></div>

    <main class="container mt-5">
        <h1 class="text-center mb-4">Kontaktujte nás</h1>
        
        <div class="row mt-5">
            <div class="col-md-6">
                <h2>Napište nám zprávu</h2>
                <form class="mt-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Váš e-mail</label>
                        <input type="email" class="form-control" placeholder="trener@pokemon.cz">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Zpráva</label>
                        <textarea class="form-control" rows="4" placeholder="S čím vám můžeme pomoci?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger fw-bold">Odeslat zprávu</button>
                </form>
            </div>
            <div class="col-md-6 mt-4 mt-md-0">
                <h2>Kde nás najdete</h2>
                <p class="mt-4"><strong>PokéMarket ČR s.r.o.</strong><br>
                Fiktivní ulice 151<br>
                702 00 Ostrava</p>
                <p><strong>E-mail:</strong> info@pokemarket-fiktivni.cz<br>
                <strong>Telefon:</strong> +420 123 456 789</p>
            </div>
        </div>
    </main>

    <div id="sablona-paticka"></div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="main.min.js"></script>
</body>
</html>
